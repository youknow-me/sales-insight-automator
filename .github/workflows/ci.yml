name: Node.js CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
    
    - name: Install Backend Deps
      run: cd backend && npm ci
      
    - name: Install Frontend Deps & Build
      run: cd frontend && npm ci && npm run build